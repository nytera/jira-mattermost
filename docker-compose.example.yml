services:
  bot:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: incident_bot
      POSTGRES_USER: incident_bot
      POSTGRES_PASSWORD: incident_bot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_bot -d incident_bot"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

networks:
  default:
    ipam:
      config:
        - subnet: 10.123.0.0/24
