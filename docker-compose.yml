services:
  bot:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: incident_bot
      POSTGRES_USER: incident_bot
      POSTGRES_PASSWORD: incident_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
