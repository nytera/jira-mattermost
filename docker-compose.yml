services:
  bot_dev:
    build: .
    env_file: .env
    ports:
      - "8085:8080"
    depends_on:
      - postgres_dev
    restart: unless-stopped

  postgres_dev:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: incident_bot
      POSTGRES_USER: incident_bot
      POSTGRES_PASSWORD: incident_bot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_bot -d incident_bot"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    volumes:
      - postgres-data_dev:/var/lib/postgresql/data

volumes:
  postgres-data_dev:

networks:
  default:
    ipam:
      config:
        - subnet: 10.124.0.0/24